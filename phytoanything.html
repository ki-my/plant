<!doctype html>
<html>
<head>
<title>식물생리학 공부하자 - 메인화면</title>
  <meta charset="utf-8">
  <style type="text/css">
    p {
    text-align: center;
    }
    aside {
      float:left;
      height:200%;
      padding:10px;
      width: 200px;
    }
    aside ul{
      list-style-type:none;
      clear:both;
      margin: 0;
      padding: 0;
      width: 200px;
      background-color: #f1f1f1;
    }
    a {
      color:black;
      text-decoration: none;
    }
    .active {
      background-color: #4CAF50;
      color: white;
    }
    h1, h3 {
      text-align: center;
    }
    #menu {
      margin: 0;
      padding: 0;
      list-style-type: none;
      border-left: 5px solid black;
    }
    #menu li a {
      display: block;
      color: #000;
      padding: 8px 10px;
      text-decoration: none;
    }
    #menu li a:hover:not(.active){
      background-color: #555;
      color: white;
    }
    .main {
      width: 80%;
      height: 100%;
      margin-left:250px;
      margin-right:250px;
      padding:5px;
      border: 3px solid black;
    }
    .m1 {
      width: 200px
    }
    .mi > li, .m2 > li {
      position: relative;
      width:100%;
    }
    .m1 > li:hover .m2 {
      left: 200px;
    }
    .m1 > li a:hover {
      display: block;
    }
    .m2 {
      width: 200px;
      position: absolute;
      left: -9999px;
    }
    .m2 > li a:hover {
      display: block;
    }
  </style>
</head>
<body>
  
</body>
</html>
